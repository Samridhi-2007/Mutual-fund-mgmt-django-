{% extends 'base.html' %}
{% block content %}
<h2>Delete Fund</h2>
<p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'fund_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
