{% extends 'base.html' %}
{% block content %}
<h2>{% if object %}Edit Fund{% else %}Add Fund{% endif %}</h2>
<form method="post" class="card card-body bg-white shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'fund_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
